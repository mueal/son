<style>
  :root{
    --bg:#0d1411; --surface:#13201a; --surface2:#1a2b22; --line:#27392f;
    --text:#eef5f0; --muted:#9fb4a8; --faint:#6f8478;
    --court:#0b6e4f; --court-soft:#103f30; --court-line:#e7f3ec;
    --amber:#e6a23c; --amber-bg:#2a2114;
    --blue:#5aa6e0; --blue-bg:#10283c;
    --green:#79c258; --green-bg:#16290f;
    --ok:#52c281; --no:#e0685f;
    --radius:16px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    min-height:100dvh;
  }
  .app{
    max-width:560px; margin:0 auto;
    padding:calc(env(safe-area-inset-top) + 14px) 16px calc(env(safe-area-inset-bottom) + 18px);
    display:flex; flex-direction:column; min-height:100dvh;
  }
  header{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
  .logo{
    width:38px; height:38px; border-radius:10px; flex:0 0 auto;
    background:var(--court); position:relative; overflow:hidden;
    box-shadow:0 2px 10px rgba(11,110,79,.4);
  }
  .logo:before{content:""; position:absolute; inset:6px; border:1.5px solid var(--court-line); border-radius:2px;}
  .logo:after{content:""; position:absolute; left:6px; right:6px; top:50%; height:1.5px; background:var(--court-line);}
  .title h1{font-size:16px; font-weight:700; margin:0; letter-spacing:-.3px;}
  .title p{font-size:11.5px; color:var(--muted); margin:1px 0 0;}

  .stats{display:flex; gap:8px; margin-bottom:12px;}
  .stat{flex:1; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:9px 10px; text-align:center;}
  .stat .v{font-size:18px; font-weight:700; line-height:1.1;}
  .stat .l{font-size:10.5px; color:var(--muted); margin-top:2px;}
  .stat.ok .v{color:var(--ok);} .stat.no .v{color:var(--no);}

  .filters{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px;}
  .chip{
    font-size:13px; padding:7px 13px; border-radius:999px; cursor:pointer;
    background:var(--surface); border:1px solid var(--line); color:var(--muted);
    font-weight:500; transition:.15s; user-select:none;
  }
  .chip.on{background:var(--court); border-color:var(--court); color:#fff;}

  .modeseg{display:flex; gap:0; margin-bottom:12px; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:3px;}
  .seg{flex:1; font-size:13.5px; font-weight:600; padding:9px; min-height:auto; border:none; border-radius:9px; background:transparent; color:var(--muted); transition:.15s;}
  .seg.on{background:var(--court); color:#fff;}

  .progress{height:5px; background:var(--surface2); border-radius:999px; overflow:hidden; margin-bottom:14px;}
  .progress > div{height:100%; width:0; background:var(--court); border-radius:999px; transition:width .3s;}

  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px 17px 20px; flex:1; display:flex; flex-direction:column; min-height:230px;
    position:relative; overflow:hidden;
  }
  .card:before{content:""; position:absolute; top:0; left:0; right:0; height:3px; background:var(--court);}
  .card.tappable{cursor:pointer;}
  .card.tappable:active{transform:scale(.992); background:var(--surface2);}
  .taphint{margin-top:14px; padding-top:10px; border-top:1px dashed var(--line); font-size:11.5px; color:var(--faint); text-align:right; pointer-events:none;}
  .meta{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;}
  .meta-l{display:flex; align-items:center; gap:8px;}
  .cat{font-size:11.5px; font-weight:600; padding:3px 10px; border-radius:999px;}
  .cat.규정{background:var(--blue-bg); color:var(--blue);}
  .cat.지도방법{background:var(--green-bg); color:var(--green);}
  .cat.용어{background:var(--amber-bg); color:var(--amber);}
  .qid{font-size:11.5px; color:var(--faint);}
  .prevmark{font-size:11.5px; font-weight:600;}
  .prevmark.right{color:var(--ok);} .prevmark.wrong{color:var(--no);}

  .question{font-size:18.5px; font-weight:600; line-height:1.5; letter-spacing:-.3px;}

  .hint{
    margin-top:18px; padding:18px 14px; border:1.5px dashed var(--line); border-radius:12px;
    text-align:center; color:var(--faint); font-size:13px; line-height:1.7;
  }
  .answer{margin-top:16px; padding-top:15px; border-top:1px solid var(--line); animation:fade .25s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}
  .answer .label{font-size:11px; color:var(--muted); letter-spacing:.5px; margin-bottom:9px; font-weight:600;}
  .answer ul{margin:0; padding-left:4px; list-style:none;}
  .answer li{position:relative; padding-left:18px; margin-bottom:8px; font-size:15.5px; line-height:1.6;}
  .answer li:before{content:""; position:absolute; left:2px; top:9px; width:6px; height:6px; border-radius:50%; background:var(--court); }
  .answer.single li{padding-left:0;}
  .answer.single li:before{display:none;}

  .done{margin:auto; text-align:center;}
  .done .big{font-size:34px;}
  .done h2{font-size:19px; margin:10px 0 4px; font-weight:700;}
  .done p{font-size:14px; color:var(--muted); margin:0;}

  .controls{display:flex; gap:8px; margin-top:13px;}
  button{
    font-family:inherit; font-size:15px; font-weight:600; cursor:pointer;
    background:var(--surface2); color:var(--text); border:1px solid var(--line);
    border-radius:12px; padding:13px; transition:.12s; min-height:48px;
  }
  button:active{transform:scale(.97);}
  .nav{flex:0 0 auto; width:50px; color:var(--muted);}
  .reveal{flex:1; background:var(--court); border-color:var(--court); color:#fff;}
  .grade{display:none; gap:8px; margin-top:8px;}
  .grade.show{display:flex;}
  .grade button{flex:1;}
  .btn-wrong{background:transparent; border-color:#5a2c2a; color:var(--no);}
  .btn-right{background:transparent; border-color:#28563c; color:var(--ok);}

  .toolbar{display:flex; align-items:center; gap:7px; margin-top:14px; flex-wrap:wrap;}
  .toolbar button{font-size:13px; font-weight:500; padding:8px 12px; min-height:auto; background:var(--surface); color:var(--muted);}
  .toggle{margin-left:auto; display:flex; align-items:center; gap:7px; font-size:13px; color:var(--muted); cursor:pointer; user-select:none;}
  .toggle input{width:34px; height:20px; -webkit-appearance:none; appearance:none; background:var(--surface2); border:1px solid var(--line); border-radius:999px; position:relative; cursor:pointer; transition:.2s; flex:0 0 auto;}
  .toggle input:checked{background:var(--court); border-color:var(--court);}
  .toggle input:before{content:""; position:absolute; top:1px; left:1px; width:16px; height:16px; border-radius:50%; background:#fff; transition:.2s;}
  .toggle input:checked:before{transform:translateX(14px);}

  .foot{font-size:11px; color:var(--faint); margin-top:14px; line-height:1.6; text-align:center;}
  .saved{display:inline-flex; align-items:center; gap:4px; color:var(--ok);}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo" aria-hidden="true"></div>
    <div class="title">
      <h1>테니스 구술 퀴즈</h1>
      <p>생활체육지도사 2급 · 주관식 67문항</p>
    </div>
  </header>

  <div class="modeseg" id="modeseg">
    <button class="seg on" id="seg-quiz" data-mode="quiz">퀴즈 모드</button>
    <button class="seg" id="seg-study" data-mode="study">공부 모드</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="s-total">0</div><div class="l">문항</div></div>
    <div class="stat ok"><div class="v" id="s-right">0</div><div class="l">맞힘</div></div>
    <div class="stat no"><div class="v" id="s-wrong">0</div><div class="l">틀림</div></div>
    <div class="stat"><div class="v" id="s-rate">0%</div><div class="l">정답률</div></div>
  </div>

  <div class="filters" id="filters"></div>
  <div class="progress" id="progress"><div id="bar"></div></div>

  <div class="card" id="card"></div>

  <div class="controls" id="controls">
    <button class="nav" id="prev" aria-label="이전">‹</button>
    <button class="reveal" id="reveal">답 보기</button>
    <button class="nav" id="next" aria-label="다음">›</button>
  </div>
  <div class="grade" id="grade">
    <button class="btn-wrong" id="wrong">✕  틀렸음</button>
    <button class="btn-right" id="right">✓  맞았음</button>
  </div>

  <div class="toolbar">
    <button id="toolbar-shuffle">↺ 섞기</button>
    <button id="toolbar-reset">처음부터</button>
    <label class="toggle" id="wrongonly-label"><span>틀린 문제만</span><input type="checkbox" id="wrongonly"></label>
  </div>

  <div class="foot">
    <span class="saved" id="savestate">● 진행 상황 자동 저장됨</span><br>
    홈 화면에 추가하면 앱처럼 사용할 수 있습니다.
  </div>
</div>

<script>
const QUIZ = [{"n":1,"cat":"규정","q":"코트 측면 높이 및 네트 중간의 높이는?","a":["네트 측면의 높이는 1.07m, 중심의 높이는 0.91m입니다."]},{"n":2,"cat":"규정","q":"단식 테니스 코트의 규격은?","a":["단식 사이드라인 23.77m, 베이스라인 8.23m의 직사각형으로 이루어집니다."]},{"n":3,"cat":"규정","q":"복식 테니스 코트의 규격은?","a":["복식 사이드라인 23.77m, 베이스라인 10.97m의 직사각형으로 이루어집니다."]},{"n":4,"cat":"지도방법","q":"스플릿 스텝을 설명하시오.","a":["상대방이 볼을 치는 순간 두 발이 공중에 떴다가 지면에 닿는 것입니다. 중심과 밸런스를 유지하게 해주고, 좌·우·앞·뒤 방향으로 빠른 추진력을 줄 수 있습니다."]},{"n":5,"cat":"지도방법","q":"테니스에서 공의 스핀에 대해 설명하시오.","a":["공의 스핀에는 총 4가지 종류가 있습니다.","플랫(Flat): 스윙 궤도와 타구 방향이 모두 수평이고 종속이 빠릅니다.","탑스핀(Topspin): 스핀의 정방향으로 걸리며 마그누스 효과로 뚝 떨어집니다. 일반적인 그라운드 스트로크에 많이 쓰입니다.","언더스핀(Underspin): 슬라이스·발리 시 공의 아랫부분을 깎으며 발생, 바운드 후 낮게 깔립니다.","사이드스핀(Sidespin): 공의 옆부분을 깎아 주며, 슬라이스 서브나 앵글 발리에 쓰입니다."]},{"n":6,"cat":"지도방법","q":"테니스 코칭 시 그룹을 나누는 방법을 설명하시오.","a":["기술 수준: 초보자는 기초에, 상급자는 고급 전략·전술에 집중하도록 그룹화합니다.","나이: 비슷한 연령대로 묶으면 편안한 학습 환경을 만듭니다.","체력 수준: 그룹별 적절한 피트니스·컨디셔닝을 계획할 수 있습니다.","목표와 포부: 경쟁 지향과 즐기는 지향을 구분합니다.","훈련 강도: 감당 가능한 강도에 따라 나눕니다."]},{"n":7,"cat":"규정","q":"테니스의 실점 상황 5가지를 설명하시오.","a":["공이 바닥에 2번 닿은 경우(투 바운드)","더블 폴트","아웃 오브 바운드","상대편의 공이 신체에 맞은 경우","라켓이 손에서 떨어져 그 라켓에 맞고 상대 진영으로 들어간 경우","공이 네트에 맞고 자기 쪽 코트에 떨어진 경우"]},{"n":8,"cat":"규정","q":"테니스 그립의 6가지 종류를 설명하시오.","a":["컨티넨탈 그립","이스턴 그립","세미웨스턴 그립","웨스턴 그립","이스턴 백핸드 그립","세미웨스턴 백핸드 그립"]},{"n":9,"cat":"규정","q":"엔드체인지를 설명하시오.","a":["바람·햇빛 등 동일 조건에서 경기하도록 코트 위치를 바꾸는 것입니다. 보통 90초 휴식이 주어지지만, 타이브레이크 상황의 엔드체인지에는 휴식이 없습니다."]},{"n":10,"cat":"규정","q":"리시브 순서는?","a":["듀스코트에서 먼저 받고, 그 다음 애드코트에서 받습니다."]},{"n":11,"cat":"규정","q":"동전을 던져 이겼을 때 선택할 수 있는 것은?","a":["서브 또는 리시브를 선택할 수 있습니다."]},{"n":12,"cat":"규정","q":"두 번째 서브가 네트에 맞고 IN 되었는데 선심이 폴트로 잘못 콜 후 즉시 정정한 경우?","a":["두 번째 서브를 다시 하게 합니다."]},{"n":13,"cat":"규정","q":"셀프 게임에서 상대 볼이 아웃인지 인인지 확실하지 않을 경우?","a":["상대에게 유리하게 판정합니다."]},{"n":14,"cat":"규정","q":"듀스 사이드에서 서브해야 하는데 애드 사이드에서 첫 서브해 폴트된 뒤 잘못을 알았다면?","a":["듀스 사이드에서 두 번째 서브를 합니다."]},{"n":15,"cat":"규정","q":"서브한 볼이 바운드 전에 서버의 파트너 몸에 맞은 경우?","a":["해당 서브만 폴트가 됩니다."]},{"n":16,"cat":"규정","q":"서브한 볼이 바운드 전에 리시버의 몸에 맞았다면?","a":["리시브하는 쪽의 실점입니다."]},{"n":17,"cat":"규정","q":"단식 A서브 차례인데 B가 첫 서브해 폴트된 후 알았다면?","a":["A가 첫 서브부터 다시 해야 합니다."]},{"n":18,"cat":"규정","q":"복식 A서브 순서인데 B가 서브해 첫 서브 폴트된 후 알았다면?","a":["즉시 A가 서브하되, 두 번째 서브를 하면 됩니다."]},{"n":19,"cat":"규정","q":"위 상황에서 리시브 순서가 바뀌었다면(A 받을 차례에 B가 받음)?","a":["바뀐 대로 진행하고, 다음 게임에서 원래 순서로 돌아갑니다."]},{"n":20,"cat":"규정","q":"경기 중 화장실에 가야 하는 경우?","a":["세트가 끝난 후 주심의 허락을 받고 가야 합니다."]},{"n":21,"cat":"규정","q":"단식 경기 중 화장실에 갈 수 있는 횟수는?","a":["남자는 3세트 1회·5세트 2회, 여자는 2회 갈 수 있습니다."]},{"n":22,"cat":"규정","q":"남자 프로 테니스의 종류를 설명하시오.","a":["ITF가 관장하는 4대 메이저(그랜드슬램)·남자 퓨처스·남자 서킷 대회와, ATP가 주관하는 ATP 투어·남자 챌린저 대회로 나뉩니다."]},{"n":23,"cat":"규정","q":"남자 챌린저 대회를 설명하시오.","a":["ATP 투어보다 한 단계 낮은 등급으로, 상금에 따라 2만5천·3만7천5백·5만·7만5천·10만·12만5천 달러 6단계로 구분됩니다. 특별 규정 외에는 ATP 투어 규정에 준해 개최됩니다."]},{"n":24,"cat":"규정","q":"남자 퓨처스 대회를 설명하시오.","a":["상금 1만 달러 대회가 3회 이상, 또는 1만5천 달러 대회가 2회 이상 연속 개최되도록 되어 있습니다."]},{"n":25,"cat":"규정","q":"WTA 투어 대회를 설명하시오.","a":["WTA 승인 여자 프로대회의 공식 국제 서킷으로, 상금 규모에 따라 4단계로 분류됩니다.","1급(TIER 1) — WTA 1000","2급(TIER 2) — WTA 500","3급(TIER 3) — WTA 250","4급(TIER 4) — WTA 125"]},{"n":26,"cat":"지도방법","q":"스트링의 두께에 따른 기능 차이를 설명하시오.","a":["가늘수록 반발력이 높고 타구감이 부드러우며 볼 스피드가 빨라지나 쉽게 끊어집니다. 굵으면 타구감·스피드는 떨어져도 내구성과 컨트롤이 좋습니다."]},{"n":27,"cat":"지도방법","q":"운동 손상 시 냉찜질의 적정 시간 및 기간은?","a":["12시간마다 20분 정도 시행합니다."]},{"n":28,"cat":"지도방법","q":"그라운드 스트로크에서 타점이 뒤인 사람의 교정 방법은?","a":["등 뒤에서 네트 방향으로 볼을 던져주고 타구하게 합니다."]},{"n":29,"cat":"지도방법","q":"포인트를 획득하기 위한 전술·전략에는 무엇이 있는가?","a":["3구 마무리 전략: 서브 후 3구 처리에 집중합니다.","서브 앤 발리 전략: 서브 직후 바로 발리해 빠른 템포로 전개합니다.","패싱샷 전략: 상대가 발리하러 나올 때 다운더라인·앵글샷으로 공략합니다.","앵글 발리 전략: 발리 시 각을 많이 냅니다.","로브 전략: 상대가 네트 가까이 있을 때 효과적입니다.","드롭샷 전략: 상대가 베이스라인보다 멀리 있을 때 효과적입니다."]},{"n":30,"cat":"지도방법","q":"양손 백핸드(투핸드)의 장점은?","a":["원핸드보다 강한 힘을 낼 수 있고, 안정적이고 파워풀하게 칠 수 있습니다. 높은 공 처리에 유리하며 비교적 쉽게 배울 수 있습니다."]},{"n":31,"cat":"규정","q":"타이브레이크 게임이란?","a":["6:6일 때 한 게임으로 세트 승부를 결정하는 게임입니다. 7포인트 선취와 10포인트 선취 두 종류가 있으며 주로 7포인트 방식을 적용합니다. 6:6(6 all)이 되면 듀스로 2포인트 차까지 계속합니다."]},{"n":32,"cat":"규정","q":"타이브레이크 게임 중 서브 순서는?","a":["첫 포인트 서브는 듀스코트에서 차례가 된 선수가 넣습니다.","두 번째 포인트부터 상대가 애드코트에서 시작해 2포인트씩 번갈아 넣습니다.","양 팀 포인트 합이 6점·6의 배수가 되면 코트를 체인지합니다.","6:6일 때는 2포인트 차까지 듀스를 계속합니다."]},{"n":33,"cat":"규정","q":"세트 브레이크 제한시간은?","a":["세트 브레이크 제한시간은 120초입니다. (엔드체인지는 90초)"]},{"n":34,"cat":"지도방법","q":"스탠스의 종류와 특징을 설명하시오.","a":["오픈 스탠스: 세미웨스턴·웨스턴 그립에 적합, 포핸드 탑스핀에 유리합니다.","세미오픈 스탠스: 오픈과 비슷하나 앞쪽 중심 이동이 가능해 더 공격적입니다.","클로즈 스탠스: 가동범위가 제한되어 서브 시 사용합니다.","스퀘어 스탠스: 앞발로 체중 이동이 가능해 낮고 빠른 볼에 유리, 포핸드 이스턴 그립에 맞고 초보자가 익히기 좋습니다."]},{"n":35,"cat":"규정","q":"스탠다드 게임과 노애드 게임을 비교 설명하시오.","a":["스탠다드 게임: 듀스 시 2포인트 차까지 계속하는 게임입니다.","노애드 게임: 듀스 상황에서 한 포인트로 승부를 결정하는 방법입니다."]},{"n":36,"cat":"지도방법","q":"슬라이스의 장단점은?","a":["[장점] 낮은 바운스로 처리하기 어렵게 만듭니다.","스핀·속도 조절로 원하는 위치로 보내는 제어력을 줍니다.","수비적 상황에서 공격 차단·실수 유도에 효과적입니다.","스핀이 거의 없어 상대가 타이밍을 예측하기 어렵습니다.","[단점] 공격력에 한계가 있습니다.","상대가 익숙하면 약점이 노출될 수 있습니다.","스윙 각도·타이밍에 따라 일관성이 떨어질 수 있습니다."]},{"n":37,"cat":"규정","q":"서브 시 렛(Let) 상황은?","a":["예기치 않은 일로 플레이 진행이 방해됨을 심판이 선고하는 것이 렛입니다. 서브의 렛은 그 서브만 다시, 그 외 상황의 렛은 그 포인트 전체를 다시 합니다."]},{"n":38,"cat":"규정","q":"서버가 어떻게 하면 풋폴트가 되는가?","a":["발을 약간 움직이는 것은 허용되나 걷거나 뛰어가는 자세","어느 한 발이 베이스라인 또는 코트를 밟았을 때","어느 한 발이 사이드라인 가상연장선 바깥쪽으로 넘어갔을 때","어느 한 발이 센터마크 가상연장선을 넘어갔을 때"]},{"n":39,"cat":"규정","q":"호크아이(챌린지) 시스템이란?","a":["심판 판정을 검토하기 위해 쓰는 시스템입니다.","포인트 일시 중지: 의문 제기 시 플레이를 멈추고 챌린지를 요청합니다.","챌린지 확인: 선수·코치가 챌린지 버튼을 누릅니다.","검토: 심판이 코트 사이드 모니터로 영상을 검토합니다.","결정: 판정 확인 또는 번복을 결정해 코트로 전달합니다.","경고: 잘못 사용 시 경고, 누적되면 포인트 페널티로 이어집니다."]},{"n":40,"cat":"규정","q":"[규칙1] 코트의 규격과 네트 높이를 설명하시오.","a":["코트는 직사각형이며 길이 23.77m(78ft), 폭은 단식 8.23m·복식 10.97m입니다.","높이 1.07m의 두 네트포스트에 매달린 네트로 반으로 나뉘며, 네트 가운데 높이는 0.914m입니다."]},{"n":41,"cat":"규정","q":"[규칙2] 퍼머넌트 픽스쳐에는 무엇이 포함되는가?","a":["백스탑·사이드스탑, 관중, 스탠드·관중석, 코트 주변 모든 픽스쳐, 주심·선심·네트 엄파이어, 자기 자리를 지키는 볼보이가 포함됩니다.","단식 시 네트포스트와 싱글스틱 바깥쪽 사이 네트 부분은 퍼머넌트 픽스쳐로 간주합니다."]},{"n":42,"cat":"규정","q":"[규칙3] 볼 체인지 규정과 케이스를 설명하시오.","a":["웜업을 두 게임으로 간주하므로 첫 볼 체인지는 이후보다 두 게임 일찍 시행합니다. 보통 게임 합 7게임 때 처음, 이후 9게임마다 체인지합니다.","타이브레이크는 한 게임으로 계산하고, 직전에는 체인지하지 않고 다음 세트 두 번째 게임 전으로 미룹니다.","케이스: 바람이 빠진 것이라면 그 포인트를 다시 하지 않습니다(터진 경우와 구별)."]},{"n":43,"cat":"규정","q":"[규칙4] 라켓 사용에 관한 주요 케이스를 설명하시오.","a":["스트링을 두 세트 이상 매도 되는가? → 안 됩니다(한 패턴 격자무늬만 허용).","진동흡수 부착물? → 가능하나 격자무늬 바깥쪽에만.","포인트 중 스트링이 끊어지면? → 특별 공지 없으면 계속 가능.","두 개 이상 라켓 사용? → 안 됩니다.","에너지 발생 배터리 적용? → 안 됩니다."]},{"n":44,"cat":"규정","q":"[규칙5] 스탠다드 게임 스코어 부르는 방법을 설명하시오.","a":["서버 스코어를 먼저 부릅니다. 0=러브, 첫 포인트 15, 둘째 30, 셋째 40, 넷째 게임.","양쪽이 세 포인트씩 이기면 듀스, 이후 한 포인트 이긴 쪽이 어드밴티지. 듀스 후 두 포인트 연속 이겨야 게임을 가져갑니다."]},{"n":45,"cat":"규정","q":"[규칙6] 타이브레이크 게임의 스코어 방식과 승리 조건은?","a":["0(zero), 1, 2, 3 등으로 부릅니다. 2포인트 이상 차로 먼저 7포인트를 이긴 쪽이 게임과 세트를 가져갑니다. 필요하면 2포인트 차까지 듀스를 계속합니다."]},{"n":46,"cat":"규정","q":"[규칙7] 서버·리시버의 정의와 리시버 위치 규정은?","a":["서버는 첫 포인트 타구를 시작하는 선수, 리시버는 서브된 볼을 리턴하는 선수입니다.","케이스: 리시버는 코트 라인 바깥에 서도 됩니다(자기 쪽이면 안팎 무관)."]},{"n":47,"cat":"규정","q":"[규칙8] 첫 게임의 엔드·서비스 선택은 어떻게 결정하는가?","a":["웜업 전 토스로 결정합니다. 이긴 쪽은 ①서버/리시버 선택 ②엔드 선택 ③상대가 먼저 선택하게 함 중 하나를 고르고 나머지는 상대가 정합니다.","케이스: 웜업 중단으로 코트를 떠나면 토스 결과는 유효하나 선택은 다시 할 수 있습니다."]},{"n":48,"cat":"규정","q":"[규칙9] 엔드 체인지는 언제 하는가?","a":["각 세트의 첫 게임, 셋째 게임, 이후 게임 수 합이 홀수가 될 때마다 교환합니다.","세트 합이 짝수로 끝나지 않는 한 각 세트 후 교환하며, 짝수면 다음 세트 첫 게임 직후 교환합니다."]},{"n":49,"cat":"규정","q":"[규칙10] 볼은 언제부터 언제까지 플레이 중인가?","a":["폴트·레트 콜이 없으면, 서버가 볼을 넣는 순간부터 포인트가 결정될 때까지 플레이 중입니다."]},{"n":50,"cat":"규정","q":"[규칙11] 볼이 라인에 닿으면 어떻게 간주하는가?","a":["라인에 닿으면 코트에 닿은 것(인)으로 간주합니다."]},{"n":51,"cat":"규정","q":"[규칙12] 볼이 퍼머넌트 픽스쳐에 닿으면 어떻게 판정하는가?","a":["코트에 제대로 맞은 직후 픽스쳐에 닿으면 친 선수가 득점합니다.","바닥에 닿기 전 픽스쳐에 닿으면 친 선수가 실점합니다."]},{"n":52,"cat":"규정","q":"[규칙13] 올바른 서비스 동작을 설명하시오.","a":["서버는 두 발을 베이스라인 뒤, 센터마크와 서브할 쪽 사이드라인 사이에 둡니다. 볼을 토스해 바닥에 닿기 전 라켓으로 칩니다.","서브 모션은 라켓이 볼을 치거나 놓치는 순간 끝납니다. 한 팔만 쓰는 선수는 토스에 라켓을 이용할 수 있습니다."]},{"n":53,"cat":"규정","q":"[규칙14] 풋폴트가 되는 경우는?","a":["걷거나 뛰어가는 자세(약간 움직임은 허용)","한 발이 베이스라인·코트를 밟는 것","한 발이 사이드라인 가상연장선 바깥쪽 침범","한 발이 센터마크 가상연장선 침범","케이스: 단식·복식 사이드라인 사이 뒤에서 서브? → 안 됩니다.","케이스: 발이 땅에서 떨어진 채 서브? → 됩니다."]},{"n":54,"cat":"규정","q":"[규칙15] 서비스 폴트가 되는 경우와 케이스는?","a":["서브 중 볼을 놓침, 바닥 전에 픽스쳐·싱글스틱·네트포스트에 닿음, 서브된 볼이 서버·파트너나 그 소지품에 닿으면 폴트.","케이스: 토스 후 치지 않고 잡으면? → 폴트 아닙니다(허용).","케이스: 싱글스틱에 맞고 서비스코트에 바르게 들어가면? → 폴트입니다."]},{"n":55,"cat":"규정","q":"[규칙16] 서브와 리시브의 준비 관련 규정은?","a":["서버는 리시버가 준비될 때까지 서브하지 않으나, 리시버는 합리적 시간 안에 준비해야 합니다.","리턴 자세를 취한 리시버는 준비된 것으로 간주합니다. 준비 안 됐음을 표현하면 폴트로 불릴 수 없습니다."]},{"n":56,"cat":"규정","q":"[규칙17] 서비스가 레트가 되는 경우는?","a":["서브된 볼이 네트·스트랩·밴드에 닿고 서비스코트에 바르게 들어간 경우, 그것에 닿은 후 바닥 전 리시버·파트너나 소지품에 닿은 경우, 리시버가 준비 안 된 상태에서 서브된 경우 레트입니다."]},{"n":57,"cat":"규정","q":"[규칙18] 레트가 선언되면 어떻게 처리하는가?","a":["세컨드 서비스에 대한 레트를 제외한 모든 레트는 그 포인트 전체를 다시 합니다.","케이스: 인플레이 중 다른 볼이 굴러들어와 레트, 첫 서비스가 폴트였다면? → 퍼스트 서비스부터 포인트 전체를 다시 합니다."]},{"n":58,"cat":"규정","q":"[규칙19] 선수가 실점하는 주요 경우를 설명하시오.","a":["더블 폴트","볼이 두 번 바운드되기 전에 리턴 못 함","리턴한 볼이 바닥 전 코트 밖으로 나가거나 물체에 맞음","바닥 전 볼이 픽스쳐에 맞음","서비스를 바운드 전에 리턴","고의로 볼을 잡거나 라켓에 두 번 이상 닿게 함","선수·라켓·복장·소지품이 네트·포스트·상대 코트에 닿음","볼이 네트 넘어오기 전에 침","볼이 선수 몸·복장·소지품에 닿음","복식에서 두 선수가 모두 볼을 침"]},{"n":59,"cat":"규정","q":"[규칙20] 방해가 발생하면 어떻게 판정하는가?","a":["고의적 방해 → 방해당한 선수 득점. 고의 아님·다른 것의 방해 → 그 포인트 다시.","케이스: 고의 아닌 더블 히트? → 방해 아님.","케이스: 상대가 방해받았다 생각해 멈춤? → 방해 아니며 멈춘 선수 실점.","케이스: 볼이 새를 맞춤? → 방해, 포인트 다시.","케이스: 시작 시 자기 쪽 볼·물체가 방해? → 방해 아님.","케이스: 복식 파트너 위치? → 자기 쪽이면 안팎 무관하나 상대 방해 시 규칙 적용."]},{"n":60,"cat":"규정","q":"[규칙21] 경기 중 실수가 발견되면 어떻게 수정하는가?","a":["원칙적으로 그때까지의 점수는 유효합니다.","틀린 사이드 서브 → 발견 즉시 올바른 사이드에서. 직전 폴트는 유효.","틀린 엔드 → 발견 즉시 올바른 엔드로.","서브 순서 오류 → 발견 즉시 원래 선수가. 게임이 끝났다면 바뀐 채 계속하고 볼 체인지 한 게임 늦춤.","복식 잘못된 순서로 서브해 폴트 → 그 폴트는 유효."]},{"n":61,"cat":"규정","q":"[규칙22] 계속적 플레이의 시간 규정을 설명하시오.","a":["포인트 사이 최대 20초, 엔드체인지 최대 90초.","세트 첫 게임 후·타이브레이크 중 엔드체인지는 쉬는 시간 없이.","세트 브레이크 최대 120초.","부상 시 3분 메디컬 타임아웃, 사전 발표 시 제한된 화장실·복장교환 브레이크 허용.","사전 발표 시 5세트는 3세트 후, 3세트는 2세트 후 최대 10분 휴식.","별도 결정 없으면 웜업 최대 5분."]},{"n":62,"cat":"규정","q":"[규칙23] 코칭의 정의와 허용 범위는?","a":["선수가 듣거나 볼 수 있는 모든 지시·대화가 코칭입니다. 단체전은 세트 브레이크·엔드체인지 시 가능하나, 세트 첫 게임 후·타이브레이크 중 엔드체인지엔 불가. 그 외 매치에서는 코칭 불가.","케이스: 분명한 신호로 코치? → 안 됩니다.","케이스: 중단 후 재개될 선수 코칭? → 받을 수 있습니다."]},{"n":63,"cat":"용어","q":"그랜드슬램(Grand Slam)이란 무엇인가?","a":["1년 내에 4개 메이저 대회에서 모두 우승하는 것입니다. ITF 유권해석에 따라 2년에 걸쳐 연속 4대 타이틀을 우승해도 인정받습니다."]},{"n":64,"cat":"용어","q":"낫업(Not Up)이란 무엇인가?","a":["타이밍을 놓쳐 2회 바운드 후 라켓을 댄 경우 주심이 '낫업'(무효)을 콜하는 것입니다. 볼은 노바운드 또는 원바운드 후에만 칠 수 있습니다."]},{"n":65,"cat":"용어","q":"경기 대회에서 성적 순위를 결정하는 방법에는?","a":["녹아웃 시스템: 토너먼트 방식","라운드 로빈: 리그전(풀리그) 방식"]},{"n":66,"cat":"용어","q":"메디컬 타임아웃의 규정은?","a":["경기당 최대 2회, 일반 3분 이내, 출혈 시 15분 이내(이후 심판 판단)."]},{"n":67,"cat":"용어","q":"엄파이어(심판진)의 구성을 설명하시오.","a":["치프(Chief): 레퍼리, 심판원 확보·직무 수행","치어(Chair): 주심","네트(Net): 네트 심판"]}];

const CATS = ["전체","규정","지도방법","용어"];
const KEY = "tennis_oral_quiz_v1";

let results = {};
let pref = { cat:"전체", wrongOnly:false, mode:"quiz" };
try{
  const saved = JSON.parse(localStorage.getItem(KEY) || "{}");
  results = saved.results || {};
  if(saved.pref) pref = Object.assign(pref, saved.pref);
}catch(e){}

let order = [], idx = 0, revealed = false;

function save(){
  try{ localStorage.setItem(KEY, JSON.stringify({results, pref})); }catch(e){}
}
function activeList(){
  let list = QUIZ.filter(x => pref.cat==="전체" || x.cat===pref.cat);
  if(pref.wrongOnly) list = list.filter(x => results[x.n]==="wrong");
  return list;
}
function buildOrder(){ order = activeList().map(x=>x.n); idx=0; revealed=false; }
function shuffle(){
  for(let i=order.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[order[i],order[j]]=[order[j],order[i]];}
  idx=0; revealed=false; render();
}

function renderStats(){
  const list = activeList().map(x=>x.n);
  const total = list.length;
  const right = list.filter(n=>results[n]==="right").length;
  const wrong = list.filter(n=>results[n]==="wrong").length;
  const done = right+wrong;
  document.getElementById("s-total").textContent = total;
  document.getElementById("s-right").textContent = right;
  document.getElementById("s-wrong").textContent = wrong;
  document.getElementById("s-rate").textContent = done? Math.round(right/done*100)+"%" : "0%";
}
function renderFilters(){
  const wrap = document.getElementById("filters"); wrap.innerHTML="";
  CATS.forEach(c=>{
    const cnt = c==="전체"? QUIZ.length : QUIZ.filter(x=>x.cat===c).length;
    const b = document.createElement("div");
    b.className = "chip"+(pref.cat===c?" on":"");
    b.textContent = c+" "+cnt;
    b.onclick = ()=>{ pref.cat=c; pref.wrongOnly=false; document.getElementById("wrongonly").checked=false; buildOrder(); save(); render(); };
    wrap.appendChild(b);
  });
}
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

let grade_show=false;
function setModeUI(){
  const study = pref.mode==="study";
  document.getElementById("seg-quiz").classList.toggle("on", !study);
  document.getElementById("seg-study").classList.toggle("on", study);
  // 카드/진행바/이전·다음/섞기/필터는 두 모드 공통으로 표시
  document.getElementById("card").style.display = "flex";
  document.getElementById("card").classList.toggle("tappable", study);
  document.getElementById("progress").style.display = "block";
  document.getElementById("controls").style.display = "flex";
  // 공부 모드: '답 보기' 버튼 숨김(이전/다음만), 채점·통계·틀린문제만 숨김
  document.getElementById("reveal").style.display = study?"none":"";
  document.getElementById("grade").style.display = study?"none":(grade_show?"flex":"none");
  document.querySelector(".stats").style.display = study?"none":"flex";
  document.getElementById("toolbar-reset").style.display = study?"none":"";
  document.getElementById("wrongonly-label").style.display = study?"none":"flex";
}

function render(){
  renderFilters();
  setModeUI();

  renderStats();
  const card = document.getElementById("card");
  const total = order.length;
  document.getElementById("bar").style.width = total? Math.round(idx/total*100)+"%" : "0%";

  const grade = document.getElementById("grade");
  const reveal = document.getElementById("reveal");
  const study = pref.mode==="study";

  if(total===0){
    card.innerHTML = '<div class="done"><div class="big">🎯</div><h2>문제가 없습니다</h2><p>'+(pref.wrongOnly?"틀린 문제가 없어요. 잘하고 있어요!":"해당 분야에 문제가 없습니다.")+'</p></div>';
    grade_show=false; grade.classList.remove("show"); grade.style.display="none"; if(!study) reveal.style.display="none"; return;
  }
  if(idx>=total){
    if(study){
      card.innerHTML = '<div class="done"><div class="big">📚</div><h2>마지막 문항입니다</h2><p>처음으로 돌아가려면 “‹”를 누르세요</p></div>';
      grade.style.display="none"; return;
    }
    const list = order;
    const right = list.filter(n=>results[n]==="right").length;
    const done = list.filter(n=>results[n]).length;
    const pct = done? Math.round(right/done*100):0;
    card.innerHTML = '<div class="done"><div class="big">🏆</div><h2>한 바퀴 완료!</h2><p>'+right+'/'+done+' 정답 · 정답률 '+pct+'%</p></div>';
    grade_show=false; grade.classList.remove("show"); grade.style.display="none"; reveal.style.display="none"; return;
  }
  if(!study) reveal.style.display="";

  const q = QUIZ.find(x=>x.n===order[idx]);
  const prev = results[q.n];
  const markHtml = (prev && !study)? '<span class="prevmark '+prev+'">'+(prev==="right"?"✓ 맞힌 문제":"✕ 틀린 문제")+'</span>' : '';

  // 공부 모드 또는 답 보기를 누른 경우 답을 펼침
  const showAnswer = study || revealed;
  let ansHtml;
  if(showAnswer){
    const single = q.a.length===1 ? " single" : "";
    const items = q.a.map(t=>'<li>'+esc(t)+'</li>').join("");
    ansHtml = '<div class="answer'+single+'"><div class="label">모범 답안</div><ul>'+items+'</ul></div>';
  }else{
    ansHtml = '<div class="hint">머릿속으로 답을 말해본 뒤<br><b>답 보기</b>를 누르세요</div>';
  }

  const tapHint = study ? '<div class="taphint">탭하여 다음 ›</div>' : '';
  card.innerHTML =
    '<div class="meta"><div class="meta-l"><span class="cat '+q.cat+'">'+q.cat+'</span>'+
    '<span class="qid">Q'+q.n+' · '+(idx+1)+'/'+total+'</span></div>'+markHtml+'</div>'+
    '<div class="question">'+esc(q.q)+'</div>'+ansHtml+tapHint;

  if(study){ grade.style.display="none"; return; }
  grade_show = revealed;
  grade.classList.toggle("show", revealed);
  grade.style.display = revealed?"flex":"none";
}


function doReveal(){ revealed=true; render(); }
function doGrade(v){
  if(idx<order.length){ results[order[idx]]=v; save(); flashSaved(); }
  idx++; revealed=false; render();
}
function go(d){ idx=Math.max(0,Math.min(order.length, idx+d)); revealed=false; render(); }

let flashTimer;
function flashSaved(){
  const el=document.getElementById("savestate");
  el.textContent="● 저장됨"; clearTimeout(flashTimer);
  flashTimer=setTimeout(()=>{ el.textContent="● 진행 상황 자동 저장됨"; },1200);
}

document.getElementById("reveal").onclick=doReveal;
document.getElementById("right").onclick=()=>doGrade("right");
document.getElementById("wrong").onclick=()=>doGrade("wrong");
document.getElementById("next").onclick=()=>go(1);
document.getElementById("prev").onclick=()=>go(-1);

// 공부 모드: 카드(Q&A 박스)를 탭하면 다음 문항으로
document.getElementById("card").addEventListener("click",()=>{
  if(pref.mode!=="study") return;
  if(idx>=order.length){ idx=0; revealed=false; render(); }  // 마지막 안내 화면이면 처음으로
  else go(1);
});
document.getElementById("toolbar-shuffle").onclick=shuffle;
document.getElementById("toolbar-reset").onclick=()=>{
  if(confirm("채점 기록을 모두 지우고 처음부터 시작할까요?")){
    results={}; pref.wrongOnly=false; document.getElementById("wrongonly").checked=false;
    save(); buildOrder(); render();
  }
};
const wo=document.getElementById("wrongonly");
wo.checked=pref.wrongOnly;
wo.onchange=e=>{ pref.wrongOnly=e.target.checked; buildOrder(); save(); render(); };

function setMode(m){
  pref.mode=m;
  // 공부 모드로 가면 채점 기반 '틀린 문제만'은 해제 (전체 문항 열람용)
  if(m==="study" && pref.wrongOnly){ pref.wrongOnly=false; document.getElementById("wrongonly").checked=false; }
  save();
  revealed=false;
  buildOrder();
  render();
}
document.getElementById("seg-quiz").onclick=()=>setMode("quiz");
document.getElementById("seg-study").onclick=()=>setMode("study");

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight") go(1);
  else if(e.key==="ArrowLeft") go(-1);
  else if(pref.mode==="quiz" && (e.key===" "||e.key==="Enter")){ e.preventDefault(); if(!revealed) doReveal(); }
});

// 시작 시 저장된 모드 세그먼트 반영
if(pref.mode==="study"){ document.getElementById("seg-study").classList.add("on"); document.getElementById("seg-quiz").classList.remove("on"); }
buildOrder(); render();
</script>
</body>
</html>
